# Alembic Configuration for Reflexion Backend
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# path to migration scripts.
# Use forward-slashes on all platforms.
script_location = alembic

# The URL is overridden at runtime in alembic/env.py via settings.DATABASE_URL.
# This fallback is only used if env.py does not set it.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/reflexion

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
